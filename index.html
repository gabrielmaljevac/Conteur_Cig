<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cigarettes">
<title>Cigarettes</title>
<style>
  :root {
    --bg: #0f0f10;
    --surface: #1c1c1e;
    --surface2: #2c2c2e;
    --accent: #ff6b35;
    --accent-dim: rgba(255,107,53,0.15);
    --text: #f5f5f5;
    --text-dim: #8e8e93;
    --border: rgba(255,255,255,0.08);
    --radius: 20px;
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bottom: env(safe-area-inset-bottom, 34px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Display', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Flash overlay quand ajout auto */
  .flash {
    position: fixed;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    transition: opacity 0.15s ease;
  }
  .flash.show { opacity: 0.18; }

  header {
    padding: calc(var(--safe-top) + 16px) 24px 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .app-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .date-label {
    font-size: 13px;
    color: var(--text-dim);
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 24px 24px;
    gap: 32px;
  }

  .counter-ring {
    position: relative;
    width: 220px;
    height: 220px;
  }

  .ring-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    transform: rotate(-90deg);
  }

  .ring-track {
    fill: none;
    stroke: var(--surface2);
    stroke-width: 8;
  }

  .ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 8;
    stroke-linecap: round;
    stroke-dasharray: 628;
    stroke-dashoffset: 628;
    transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .counter-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }

  .counter-number {
    font-size: 72px;
    font-weight: 700;
    letter-spacing: -4px;
    line-height: 1;
    color: var(--text);
    transition: transform 0.15s ease, opacity 0.15s ease;
  }

  .counter-number.bump { transform: scale(1.12); }

  .counter-label {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  .btn-add {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: #fff;
    font-size: 42px;
    font-weight: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.3s ease;
    line-height: 1;
    padding-bottom: 2px;
  }

  .btn-add:active { transform: scale(0.92); }

  .btn-add.pulse { animation: pulse-ring 0.4s ease-out; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(255,107,53,0.5); }
    100% { box-shadow: 0 0 0 24px rgba(255,107,53,0); }
  }

  .stats-row {
    display: flex;
    gap: 12px;
    width: 100%;
  }

  .stat-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
  }

  .stat-value.accent { color: var(--accent); }

  .stat-title {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .history-section {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 16px;
  }

  .chart {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 60px;
  }

  .chart-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    height: 100%;
    justify-content: flex-end;
  }

  .chart-bar-wrap {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  .chart-bar {
    width: 100%;
    border-radius: 4px 4px 0 0;
    background: var(--surface2);
    min-height: 3px;
  }

  .chart-bar.today { background: var(--accent); }

  .chart-day {
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
  }

  .bottom-bar {
    padding: 16px 24px calc(var(--safe-bottom) + 16px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--border);
  }

  .btn-ghost {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    padding: 8px 12px;
    border-radius: 10px;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-ghost:active { background: var(--surface2); }
  .btn-undo { color: var(--accent); }

  .toast {
    position: fixed;
    bottom: calc(var(--safe-bottom) + 80px);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap;
    border: 1px solid var(--border);
    pointer-events: none;
    z-index: 100;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: flex-end;
    padding-bottom: var(--safe-bottom);
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    width: 100%;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .modal-title { font-size: 18px; font-weight: 600; }
  .modal-desc { font-size: 15px; color: var(--text-dim); line-height: 1.5; }
  .modal-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }

  .btn-danger {
    background: rgba(255,59,48,0.2);
    color: #ff3b30;
    border: 1px solid rgba(255,59,48,0.3);
    border-radius: 14px;
    padding: 16px;
    font-size: 17px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }

  .btn-cancel {
    background: var(--surface2);
    color: var(--text);
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 17px;
    font-family: inherit;
    cursor: pointer;
  }

  .smoke-container {
    position: fixed;
    pointer-events: none;
    z-index: 50;
    top: 0; left: 0; width: 100%; height: 100%;
  }

  .smoke-particle {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
    animation: smoke-rise 0.8s ease-out forwards;
  }

  @keyframes smoke-rise {
    0%   { opacity: 0.8; transform: translate(0, 0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.3); }
  }
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<header>
  <span class="app-title">Cigarettes</span>
  <span class="date-label" id="date-label"></span>
</header>

<div class="main">
  <div class="counter-ring">
    <svg class="ring-svg" viewBox="0 0 220 220">
      <circle class="ring-track" cx="110" cy="110" r="100"/>
      <circle class="ring-fill" id="ring-fill" cx="110" cy="110" r="100"/>
    </svg>
    <div class="counter-inner">
      <div class="counter-number" id="count-display">0</div>
      <div class="counter-label">aujourd'hui</div>
    </div>
  </div>

  <button class="btn-add" id="btn-add" onclick="addCig()" aria-label="Ajouter une cigarette">+</button>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="stat-avg">—</div>
      <div class="stat-title">Moy. / jour</div>
    </div>
    <div class="stat-card">
      <div class="stat-value accent" id="stat-total">0</div>
      <div class="stat-title">Total 7j</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-best">—</div>
      <div class="stat-title">Meilleur jour</div>
    </div>
  </div>

  <div class="history-section">
    <div class="section-title">7 derniers jours</div>
    <div class="chart" id="chart"></div>
  </div>
</div>

<div class="bottom-bar">
  <button class="btn-ghost btn-undo" onclick="undoCig()" id="btn-undo" disabled>↩ Annuler</button>
  <button class="btn-ghost" onclick="openResetModal()">🗑 Remettre à zéro</button>
</div>

<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">Remettre à zéro ?</div>
    <div class="modal-desc">Cela supprime uniquement le compteur d'aujourd'hui. L'historique des jours précédents est conservé.</div>
    <div class="modal-actions">
      <button class="btn-danger" onclick="resetToday()">Remettre à zéro aujourd'hui</button>
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="smoke-container" id="smoke-container"></div>

<script>
const DAILY_GOAL = 20;

function todayKey() {
  const d = new Date();
  return `cig_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getHistory() {
  try { return JSON.parse(localStorage.getItem('cig_history') || '{}'); } catch { return {}; }
}

function saveHistory(h) { localStorage.setItem('cig_history', JSON.stringify(h)); }

function getCount() {
  const h = getHistory();
  return h[todayKey()] || 0;
}

function setCount(n) {
  const h = getHistory();
  h[todayKey()] = n;
  saveHistory(h);
}

function addCig(auto) {
  const n = getCount() + 1;
  setCount(n);
  render();
  animateBump();
  if (auto) {
    // Flash rapide pour confirmer l'ajout automatique
    const flash = document.getElementById('flash');
    flash.classList.add('show');
    setTimeout(() => flash.classList.remove('show'), 300);
    showToast('🚬 +1 cigarette ajoutée !');
  } else {
    smokeEffect();
    const btn = document.getElementById('btn-add');
    btn.classList.add('pulse');
    btn.addEventListener('animationend', () => btn.classList.remove('pulse'), {once:true});
  }
  document.getElementById('btn-undo').disabled = false;
}

function undoCig() {
  const n = Math.max(0, getCount() - 1);
  setCount(n);
  render();
  showToast('Dernière cigarette annulée');
  if (n === 0) document.getElementById('btn-undo').disabled = true;
}

function resetToday() {
  setCount(0);
  render();
  closeModal();
  showToast('Compteur remis à zéro');
  document.getElementById('btn-undo').disabled = true;
}

function render() {
  const count = getCount();
  const h = getHistory();
  const today = todayKey();

  document.getElementById('count-display').textContent = count;

  const circumference = 2 * Math.PI * 100;
  const offset = circumference * (1 - Math.min(count / DAILY_GOAL, 1));
  document.getElementById('ring-fill').style.strokeDashoffset = offset;

  const days = Object.keys(h).sort().slice(-7);
  const vals = days.map(k => h[k] || 0);
  const total = vals.reduce((a,b) => a+b, 0);
  const avg = days.length ? (total / days.length).toFixed(1) : '—';
  const best = vals.length ? Math.min(...vals) : '—';

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-avg').textContent = avg;
  document.getElementById('stat-best').textContent = best === Infinity ? '—' : best;

  renderChart(h, today);

  const now = new Date();
  document.getElementById('date-label').textContent =
    now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'short' });
}

function renderChart(h, today) {
  const chart = document.getElementById('chart');
  chart.innerHTML = '';
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = `cig_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    days.push({ key, label: ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][d.getDay()], val: h[key] || 0, isToday: key === today });
  }
  const max = Math.max(...days.map(d => d.val), 1);
  days.forEach(day => {
    const col = document.createElement('div'); col.className = 'chart-col';
    const wrap = document.createElement('div'); wrap.className = 'chart-bar-wrap';
    const bar = document.createElement('div');
    bar.className = 'chart-bar' + (day.isToday ? ' today' : '');
    bar.style.height = Math.max((day.val / max) * 100, day.val > 0 ? 8 : 3) + '%';
    wrap.appendChild(bar);
    const lbl = document.createElement('div'); lbl.className = 'chart-day';
    lbl.textContent = day.isToday ? 'Auj.' : day.label;
    col.appendChild(wrap); col.appendChild(lbl); chart.appendChild(col);
  });
}

function animateBump() {
  const el = document.getElementById('count-display');
  el.classList.add('bump');
  el.addEventListener('transitionend', () => el.classList.remove('bump'), {once:true});
}

function smokeEffect() {
  const btn = document.getElementById('btn-add');
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const container = document.getElementById('smoke-container');
  for (let i = 0; i < 6; i++) {
    const p = document.createElement('div'); p.className = 'smoke-particle';
    const angle = Math.random() * 2 * Math.PI;
    const dist = 30 + Math.random() * 40;
    p.style.left = (cx - 4) + 'px'; p.style.top = (cy - 4) + 'px';
    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    p.style.animationDelay = (i * 40) + 'ms';
    container.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

function openResetModal() { document.getElementById('modal-backdrop').classList.add('open'); }
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-backdrop'))
    document.getElementById('modal-backdrop').classList.remove('open');
}

function scheduleMidnightReset() {
  const now = new Date();
  const next = new Date(now);
  next.setDate(now.getDate() + 1); next.setHours(0,0,0,0);
  setTimeout(() => { render(); scheduleMidnightReset(); }, next - now);
}

// ─── Détection ajout automatique via URL ───────────────
const params = new URLSearchParams(window.location.search);
if (params.get('add') === '1') {
  // Ajout immédiat au chargement
  window.addEventListener('DOMContentLoaded', () => {
    addCig(true);
    // Nettoie l'URL sans recharger la page
    window.history.replaceState({}, '', window.location.pathname);
  });
}

render();
scheduleMidnightReset();
if (getCount() > 0) document.getElementById('btn-undo').disabled = false;
document.addEventListener('visibilitychange', () => { if (!document.hidden) render(); });
</script>
</body>
</html>
